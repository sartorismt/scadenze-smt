<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale Scadenze — SMT</title>
<style>
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5f5e5a; --text3: #9e9d99;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #633806;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #791F1F;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #252523; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #f0ede8; --text2: #b4b2a9; --text3: #6b6a66;
      --blue-bg: #0c2a45; --blue-text: #85B7EB;
      --green-bg: #1a2e0a; --green-text: #C0DD97;
      --amber-bg: #2e1f05; --amber-text: #FAC775;
      --red-bg: #2e0f0f; --red-text: #F7C1C1;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 16px; font-weight: 600; }
  .logo span { color: var(--text2); font-weight: 400; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .sync-indicator { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width:600px) { .stats { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .stat-num { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; }
  .search-wrap input:focus { outline: none; border-color: var(--blue); }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .chip { font-size: 13px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; }
  .chip:hover { background: var(--surface2); }
  .chip.active { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; font-weight: 500; }
  .table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 12px; font-weight: 500; color: var(--text2); text-align: left; padding: 10px 14px; border-bottom: 0.5px solid var(--border); background: var(--surface2); }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 11px 14px; font-size: 14px; vertical-align: middle; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-red { background: var(--red-bg); color: var(--red-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .cat-pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
  .resp-dot { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 10px; font-weight: 600; background: var(--blue-bg); color: var(--blue-text); }
  .action-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 5px; color: var(--text3); transition: all .15s; }
  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .btn-primary { font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); border: none; background: var(--blue); color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: var(--blue-text); }
  .btn-secondary { font-size: 13px; padding: 8px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-danger { font-size: 13px; padding: 7px 14px; border-radius: var(--radius); border: none; background: var(--red-bg); color: var(--red-text); cursor: pointer; }
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.5rem; width: 100%; max-width: 540px; margin: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; border-radius: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1/-1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; gap: 8px; }
  .modal-footer-right { display: flex; gap: 8px; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 16px; border-radius: var(--radius); opacity: 0; transform: translateY(10px); transition: all .25s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  @media (max-width:700px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    td.hide-mobile, th.hide-mobile { display: none; }
    main { padding: 1rem; }
    .header-actions .btn-secondary { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SMT <span>— Gestionale Scadenze</span></div>
  <div class="header-actions">
    <div class="sync-indicator">
      <div class="sync-dot loading" id="sync-dot"></div>
      <span id="sync-label">Connessione...</span>
    </div>
    <button class="btn-secondary" onclick="exportCSV()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v8M4 6l3 3 3-3M2 10v2h10v-2"/></svg>
      Esporta CSV
    </button>
    <button class="btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 2v10M2 7h10"/></svg>
      Nuova scadenza
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3 3"/></svg>
      <input type="text" id="search" placeholder="Cerca descrizione, riferimento..." oninput="render()">
    </div>
    <select id="sort-sel" onchange="render()" style="padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px">
      <option value="date-asc">Scadenza (prima le urgenti)</option>
      <option value="date-desc">Scadenza (più lontane prima)</option>
      <option value="cat">Categoria A-Z</option>
    </select>
  </div>
  <div class="chips">
    <button class="chip active" onclick="setFilter('all',this)">Tutte</button>
    <button class="chip" onclick="setFilter('Cantieri/Appalti',this)">Cantieri / Appalti</button>
    <button class="chip" onclick="setFilter('Certificazioni',this)">Certificazioni</button>
    <button class="chip" onclick="setFilter('Lavoratori',this)">Lavoratori</button>
    <button class="chip" onclick="setFilter('Mezzi/Attrezzature',this)">Mezzi / Attrezzature</button>
    <button class="chip" onclick="setFilter('Fiscale/Amministrativo',this)">Fiscale / Amm.</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Descrizione</th>
          <th class="hide-mobile">Categoria</th>
          <th class="hide-mobile">Riferimento</th>
          <th>Scadenza</th>
          <th>Stato</th>
          <th class="hide-mobile">Resp.</th>
          <th class="hide-mobile">Note</th>
          <th style="width:50px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Nessuna scadenza trovata.</div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nuova scadenza</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </div>
    <div class="form-grid">
      <div class="form-group full"><label>Descrizione *</label><input id="f-desc" placeholder="es. Revisione autocarro Iveco Daily"></div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="f-cat">
          <option value="Cantieri/Appalti">Cantieri / Appalti</option>
          <option value="Certificazioni">Certificazioni</option>
          <option value="Lavoratori">Lavoratori</option>
          <option value="Mezzi/Attrezzature">Mezzi / Attrezzature</option>
          <option value="Fiscale/Amministrativo">Fiscale / Amministrativo</option>
        </select>
      </div>
      <div class="form-group"><label>Data scadenza *</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>Riferimento</label><input id="f-ref" placeholder="es. Mario Rossi / Iveco XX000XX"></div>
      <div class="form-group">
        <label>Responsabile</label>
        <select id="f-resp">
          <option value="Daniele">Daniele</option>
          <option value="Doriano">Doriano</option>
          <option value="Ufficio">Ufficio</option>
        </select>
      </div>
      <div class="form-group full"><label>Note</label><textarea id="f-note" placeholder="Informazioni aggiuntive, numeri pratica..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete" onclick="deleteCurrentItem()" style="display:none">Elimina</button>
      <div class="modal-footer-right">
        <button class="btn-secondary" onclick="closeModal()">Annulla</button>
        <button class="btn-primary" id="btn-save" onclick="saveItem()">Salva</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvEYin5rpZ64ps8WON9Rxku7Dz6jkAZCtQnd17Hz2guOswg_k7M1aorqN9Pb5cZoO4Eg/exec';

let items = [];
let editId = null;
let activeFilter = 'all';

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state==='loading'?' loading':state==='error'?' error':'');
  lbl.textContent = state==='ok'?'Sincronizzato':state==='loading'?'Aggiornamento...':'Errore connessione';
}

async function api(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: payload ? 'POST' : 'GET',
    body: payload ? JSON.stringify(payload) : undefined,
  });
  return res.json();
}

async function loadItems() {
  setSyncStatus('loading');
  try {
    const data = await api(null);
    items = Array.isArray(data) ? data : [];
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('Errore connessione');
  }
  render();
}

function getStatus(dateStr) {
  if (!dateStr) return { label: 'N/D', cls: 'badge-blue', days: 999 };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return { label: `Scaduta ${Math.abs(diff)}gg fa`, cls: 'badge-red', days: diff };
  if (diff === 0) return { label: 'Oggi', cls: 'badge-red', days: 0 };
  if (diff <= 30) return { label: `Entro ${diff}gg`, cls: 'badge-amber', days: diff };
  if (diff <= 90) return { label: `${diff} giorni`, cls: 'badge-blue', days: diff };
  return { label: `${diff} giorni`, cls: 'badge-green', days: diff };
}

function renderStats() {
  const sc = items.filter(i=>getStatus(i.DATA).days<0).length;
  const ur = items.filter(i=>{const s=getStatus(i.DATA);return s.days>=0&&s.days<=30;}).length;
  const pr = items.filter(i=>{const s=getStatus(i.DATA);return s.days>30&&s.days<=90;}).length;
  const ok = items.filter(i=>getStatus(i.DATA).days>90).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${sc}</div><div class="stat-label">Scadute</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${ur}</div><div class="stat-label">Entro 30 giorni</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${pr}</div><div class="stat-label">Entro 90 giorni</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${ok}</div><div class="stat-label">Nella norma</div></div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const initials = r => r ? r.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';

function render() {
  renderStats();
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  let list = items.filter(i => {
    const mc = activeFilter==='all' || i.CATEGORIA===activeFilter;
    const mq = !q || (i.DESCRIZIONE||'').toLowerCase().includes(q) || (i.RIFERIMENTO||'').toLowerCase().includes(q) || (i.NOTE||'').toLowerCase().includes(q);
    return mc && mq;
  });
  list.sort((a,b) => sort==='date-asc' ? new Date(a.Data)-new Date(b.Data) : sort==='date-desc' ? new Date(b.Data)-new Date(a.Data) : (a.Categoria||'').localeCompare(b.Categoria||''));
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!list.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = list.map(item => {
    const s = getStatus(item.DATA);
    const df = item.DATA ? new Date(item.DATA).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
    return `<tr>
      <td style="font-weight:500;max-width:220px;line-height:1.3">${esc(item.DESCRIZIONE)}</td>
      <td class="hide-mobile"><span class="cat-pill">${esc(item.CATEGORIA)}</span></td>
      <td class="hide-mobile" style="color:var(--text2);font-size:13px">${esc(item.RIFERIMENTO||'—')}</td>
      <td style="white-space:nowrap;font-size:13px">${df}</td>
      <td><span class="badge ${s.cls}">${s.label}</span></td>
      <td class="hide-mobile"><span class="resp-dot" title="${esc(item.RESPONSABILE)}">${initials(item.RESPONSABILE)}</span></td>
      <td class="hide-mobile" style="font-size:12px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.NOTE||'—')}</td>
      <td><button class="action-btn" onclick='openModal("${item.ID}")'>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.5 2.5l2 2-8 8H2.5v-2l8-8z"/></svg>
      </button></td></tr>`;
  }).join('');
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function openModal(id) {
  editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Modifica scadenza' : 'Nuova scadenza';
  document.getElementById('btn-delete').style.display = id ? 'block' : 'none';
  if (id) {
    const item = items.find(i=>String(i.ID)===String(id)); if (!item) return;
    document.getElementById('f-desc').value = item.DESCRIZIONE || '';
    document.getElementById('f-cat').value = item.CATEGORIA || 'Cantieri/Appalti';
    document.getElementById('f-ref').value = item.RIFERIMENTO || '';
    document.getElementById('f-date').value = item.DATA || '';
    document.getElementById('f-resp').value = item.RESPONSABILE || 'Daniele';
    document.getElementById('f-note').value = item.NOTE || '';
  } else {
    document.getElementById('f-desc').value = '';
    document.getElementById('f-cat').value = 'Cantieri/Appalti';
    document.getElementById('f-ref').value = '';
    document.getElementById('f-date').value = '';
    document.getElementById('f-resp').value = 'Daniele';
    document.getElementById('f-note').value = '';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-desc').focus(), 100);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }

async function saveItem() {
  const desc = document.getElementById('f-desc').value.trim();
  const data = document.getElementById('f-date').value;
  if (!desc) { document.getElementById('f-desc').focus(); return; }
  if (!data) { document.getElementById('f-date').focus(); return; }
  const payload = {
    action: editId ? 'update' : 'insert',
    ID: editId,
    Descrizione: desc,
    Categoria: document.getElementById('f-cat').value,
    Riferimento: document.getElementById('f-ref').value.trim(),
    Data: data,
    Responsabile: document.getElementById('f-resp').value,
    Note: document.getElementById('f-note').value.trim()
  };
  setSyncStatus('loading');
  document.getElementById('btn-save').disabled = true;
  try {
    await api(payload);
    showToast(editId ? 'Scadenza aggiornata' : 'Scadenza aggiunta');
    closeModal();
    await loadItems();
  } catch(e) {
    setSyncStatus('error');
    showToast('Errore salvataggio');
  }
  document.getElementById('btn-save').disabled = false;
}

async function deleteCurrentItem() {
  if (!editId) return;
  if (!confirm('Eliminare questa scadenza?')) return;
  setSyncStatus('loading');
  try {
    await api({ action: 'delete', ID: editId });
    showToast('Scadenza eliminata');
    closeModal();
    await loadItems();
  } catch(e) {
    setSyncStatus('error');
    showToast('Errore eliminazione');
  }
}

function exportCSV() {
  const h = ['ID','Descrizione','Categoria','Riferimento','Data','Stato','Responsabile','Note'];
  const rows = items.map(i => {
    const s = getStatus(i.DATA);
    return [i.ID,i.DESCRIZIONE,i.CATEGORIA,i.RIFERIMENTO||'',i.DATA,s.label,i.RESPONSABILE,i.NOTE||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const blob = new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'scadenze-smt-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('CSV esportato');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
document.getElementById('overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

loadItems();
</script>
</body>
</html>
